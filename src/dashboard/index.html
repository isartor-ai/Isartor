<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isartor — Management Dashboard</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;--tx:#e6edf3;--tx2:#8b949e;--acc:#388bfd;--acc2:#1f6feb;--ok:#3fb950;--warn:#d29922;--err:#f85149;--font-mono:'SF Mono','Fira Code',Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;align-items:center;gap:12px}
header img{filter:brightness(0) invert(1);opacity:.92}
header .badge{font-size:11px;background:var(--bg3);border:1px solid var(--bd);border-radius:12px;padding:2px 8px;color:var(--tx2)}
.logout-btn{margin-left:auto;background:none;border:1px solid var(--bd);color:var(--tx2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.logout-btn:hover{border-color:var(--err);color:var(--err)}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px)}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h2{margin-bottom:8px;font-size:18px}
.login-box p{color:var(--tx2);margin-bottom:24px;font-size:13px}
.login-box input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:var(--font-mono);letter-spacing:.05em;outline:none}
.login-box input:focus{border-color:var(--acc)}
.login-box button{width:100%;margin-top:12px;background:var(--acc2);border:none;border-radius:6px;color:#fff;padding:10px;font-size:14px;font-weight:600;cursor:pointer}
.login-box button:hover{background:var(--acc)}
.login-box .err-msg{color:var(--err);font-size:12px;margin-top:8px;min-height:16px}
nav{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;gap:4px}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
nav button.active{color:var(--tx);border-bottom-color:var(--acc)}
nav button:hover:not(.active){color:var(--tx)}
main{padding:24px;max-width:1200px}
.tab-content{display:none}.tab-content.active{display:block}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:20px}
.card .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin-bottom:6px}
.card .value{font-size:28px;font-weight:700;line-height:1}
.card .sub{font-size:12px;color:var(--tx2);margin-top:4px}
.card.ok .value{color:var(--ok)}.card.warn .value{color:var(--warn)}.card.err .value{color:var(--err)}
.section-title{font-size:15px;font-weight:600;margin:24px 0 12px}
.provider-table,.request-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.provider-table th,.request-table th{background:var(--bg3);text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);font-weight:500}
.provider-table td,.request-table td{padding:10px 16px;border-top:1px solid var(--bd);vertical-align:top;font-size:13px}
.provider-table tr:hover td,.request-table tr:hover td{background:var(--bg3)}
.badge-ok{display:inline-block;background:rgba(63,185,80,.15);color:var(--ok);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-err{display:inline-block;background:rgba(248,81,73,.15);color:var(--err);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-warn{display:inline-block;background:rgba(210,153,34,.15);color:var(--warn);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-info{display:inline-block;background:rgba(56,139,253,.15);color:var(--acc);border-radius:4px;padding:2px 8px;font-size:11px}
.mono{font-family:var(--font-mono);font-size:12px}
.chart-bar-wrap{margin-top:24px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.bar-row .bar-label{width:100px;font-size:12px;color:var(--tx2);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .bar-track{flex:1;background:var(--bg3);border-radius:4px;height:16px;overflow:hidden}
.bar-row .bar-fill{height:100%;background:var(--acc2);border-radius:4px;transition:width .4s}
.bar-row .bar-fill.deflected{background:var(--ok)}
.bar-row .bar-val{width:80px;font-size:12px;color:var(--tx2)}
.empty-state{text-align:center;padding:48px;color:var(--tx2)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.refresh-row button{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px}
.refresh-row button:hover{border-color:var(--acc);color:var(--acc)}
.refresh-row .ts{font-size:11px;color:var(--tx2);margin-left:auto}
.status-box{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.status-pill{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:6px 14px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.off{background:var(--tx2)}
pre.req-body{background:var(--bg3);border-radius:4px;padding:8px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow:auto;border:1px solid var(--bd)}
</style>
</head>
<body>
<header>
  <img src="/dashboard/logo.png" alt="Isartor" style="height:32px;width:auto;object-fit:contain">
  <span class="badge" id="version-badge">Management Dashboard</span>
  <button class="logout-btn" onclick="logout()" id="logout-btn" style="display:none">Sign out</button>
</header>

<div id="login-screen">
  <div class="login-box">
    <h2>Sign in</h2>
    <p>Enter your Isartor gateway API key to access the dashboard.</p>
    <input type="password" id="api-key-input" placeholder="sk-isartor-..." autocomplete="off" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Access Dashboard</button>
    <div class="err-msg" id="login-err"></div>
  </div>
</div>

<div id="app-shell" style="display:none">
  <nav>
    <button class="active" onclick="showTab('overview')">Overview</button>
    <button onclick="showTab('providers')">Providers</button>
    <button onclick="showTab('usage')">Usage</button>
    <button onclick="showTab('requests')">Request Log</button>
  </nav>

  <main>
    <!-- OVERVIEW -->
    <div id="tab-overview" class="tab-content active">
      <div class="refresh-row">
        <button onclick="loadOverview()">&#x21bb; Refresh</button>
        <span class="ts" id="ov-ts"></span>
      </div>
      <div class="status-box" id="ov-status-pills"></div>
      <div class="grid" id="ov-grid"></div>
    </div>

    <!-- PROVIDERS -->
    <div id="tab-providers" class="tab-content">
      <div class="refresh-row">
        <button onclick="loadProviders()">&#x21bb; Refresh</button>
        <span class="ts" id="pv-ts"></span>
      </div>
      <div id="pv-content"></div>
    </div>

    <!-- USAGE -->
    <div id="tab-usage" class="tab-content">
      <div class="refresh-row">
        <button onclick="loadUsage()">&#x21bb; Refresh</button>
        <span class="ts" id="us-ts"></span>
      </div>
      <div id="us-content"></div>
    </div>

    <!-- REQUESTS -->
    <div id="tab-requests" class="tab-content">
      <div class="refresh-row">
        <button onclick="loadRequests()">&#x21bb; Refresh</button>
        <span class="ts" id="rq-ts"></span>
      </div>
      <div id="rq-content"></div>
    </div>
  </main>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
const KEY_STORE = 'isartor_api_key';
let apiKey = sessionStorage.getItem(KEY_STORE) || '';
let activeTab = 'overview';
let autoRefreshTimer = null;

// ── Auth ───────────────────────────────────────────────────────────────────
async function login() {
  const input = document.getElementById('api-key-input');
  const key = input.value.trim();
  if (!key) { showLoginErr('API key cannot be empty.'); return; }
  showLoginErr('');
  try {
    const resp = await fetch('/api/admin/overview', { headers: { 'Authorization': 'Bearer ' + key } });
    if (resp.status === 401) { showLoginErr('Invalid API key.'); return; }
    if (!resp.ok) { showLoginErr('Server error: ' + resp.status); return; }
    apiKey = key;
    sessionStorage.setItem(KEY_STORE, key);
    showApp();
  } catch (e) { showLoginErr('Connection failed: ' + e.message); }
}

function logout() {
  apiKey = '';
  sessionStorage.removeItem(KEY_STORE);
  clearInterval(autoRefreshTimer);
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('api-key-input').value = '';
}

function showLoginErr(msg) { document.getElementById('login-err').textContent = msg; }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  document.getElementById('logout-btn').style.display = '';
  loadOverview();
  autoRefreshTimer = setInterval(() => { if (activeTab === 'overview') loadOverview(); }, 30000);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((btn, i) => {
    const tabs = ['overview','providers','usage','requests'];
    btn.classList.toggle('active', tabs[i] === name);
  });
  const loaders = { overview: loadOverview, providers: loadProviders, usage: loadUsage, requests: loadRequests };
  loaders[name]();
}

// ── API helper ─────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const resp = await fetch(path, { headers: { 'Authorization': 'Bearer ' + apiKey } });
  if (resp.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

function fmtTs(d) {
  return 'Updated ' + new Date(d).toLocaleTimeString();
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function num(v) { return v?.toLocaleString() ?? '—'; }
function usd(v) { return v == null ? '—' : '$' + v.toFixed(4); }

// ── Overview ───────────────────────────────────────────────────────────────
async function loadOverview() {
  try {
    const d = await apiFetch('/api/admin/overview');
    document.getElementById('version-badge').textContent = 'v' + d.version;
    document.getElementById('ov-ts').textContent = fmtTs(Date.now());

    const pills = [
      { label: 'SLM Router', on: d.slm_router_enabled },
      { label: 'Request Logging', on: d.request_logging_enabled },
      { label: 'Offline Mode', on: d.offline_mode, invert: true },
    ];
    document.getElementById('ov-status-pills').innerHTML = pills.map(p => {
      const cls = p.invert ? (p.on ? 'warn' : 'ok') : (p.on ? 'ok' : 'off');
      const lbl = p.on ? 'enabled' : 'disabled';
      return `<div class="status-pill"><span class="dot ${cls}"></span>${p.label} <strong>${lbl}</strong></div>`;
    }).join('');

    const deflPct = (d.deflection_rate * 100).toFixed(1);
    const deflClass = d.deflection_rate >= 0.6 ? 'ok' : d.deflection_rate >= 0.3 ? 'warn' : '';
    const cards = [
      { label: 'Provider', value: d.provider.toUpperCase(), sub: d.model, cls: '' },
      { label: 'Total Requests', value: num(d.total_requests), sub: 'all-time window', cls: '' },
      { label: 'Deflection Rate', value: deflPct + '%', sub: num(d.total_deflected) + ' deflected', cls: deflClass },
      { label: 'Total Tokens', value: num(d.total_tokens), sub: 'prompt + completion', cls: '' },
      { label: 'Cloud Cost', value: usd(d.estimated_cost_usd), sub: 'L3 calls only', cls: '' },
      { label: 'Estimated Savings', value: usd(d.estimated_saved_cost_usd), sub: 'via deflection', cls: 'ok' },
    ];
    document.getElementById('ov-grid').innerHTML = cards.map(c =>
      `<div class="card ${c.cls}"><div class="label">${c.label}</div><div class="value">${c.value}</div><div class="sub">${c.sub}</div></div>`
    ).join('');
  } catch (e) {
    document.getElementById('ov-grid').innerHTML = `<div class="empty-state">Failed to load: ${e.message}</div>`;
  }
}

// ── Providers ──────────────────────────────────────────────────────────────
async function loadProviders() {
  document.getElementById('pv-content').innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const d = await apiFetch('/api/admin/providers');
    document.getElementById('pv-ts').textContent = fmtTs(Date.now());
    const providers = d.providers || [];
    if (!providers.length) {
      document.getElementById('pv-content').innerHTML = '<div class="empty-state">No providers configured.</div>';
      return;
    }
    const rows = providers.map(p => {
      const hBadge = p.health === 'healthy' ? 'badge-ok' : p.health === 'degraded' ? 'badge-warn' : 'badge-err';
      const keys = Array.isArray(p.key_pool) ? p.key_pool.map(k =>
        `<span class="mono">${k.masked_key}</span> <span class="badge-info">${k.rotation_strategy}</span>`
      ).join('<br>') : '—';
      return `<tr>
        <td><strong>${p.provider}</strong></td>
        <td class="mono">${p.model || '—'}</td>
        <td><span class="${hBadge}">${p.health || '—'}</span></td>
        <td>${p.total_requests ?? 0}</td>
        <td>${p.error_count ?? 0}</td>
        <td>${keys}</td>
      </tr>`;
    }).join('');
    document.getElementById('pv-content').innerHTML = `
      <table class="provider-table">
        <thead><tr><th>Provider</th><th>Model</th><th>Health</th><th>Requests</th><th>Errors</th><th>Keys</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('pv-content').innerHTML = `<div class="empty-state">Failed to load: ${e.message}</div>`;
  }
}

// ── Usage ──────────────────────────────────────────────────────────────────
async function loadUsage() {
  document.getElementById('us-content').innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const d = await apiFetch('/api/admin/usage');
    document.getElementById('us-ts').textContent = fmtTs(Date.now());
    const total = (d.total_requests || 0) + (d.total_deflected_requests || 0);
    const entries = (d.entries || []).slice().reverse();
    const maxReq = Math.max(...entries.map(e => (e.total_requests || 0) + (e.total_deflected_requests || 0)), 1);

    const summary = `
      <div class="grid" style="margin-bottom:24px">
        <div class="card"><div class="label">Window</div><div class="value" style="font-size:18px">${d.window_hours}h</div><div class="sub">analysis window</div></div>
        <div class="card"><div class="label">Total Requests</div><div class="value">${num(total)}</div><div class="sub">${num(d.total_deflected_requests)} deflected</div></div>
        <div class="card ok"><div class="label">Deflection Rate</div><div class="value">${pct(d.deflection_rate || 0)}</div></div>
        <div class="card"><div class="label">Prompt Tokens</div><div class="value">${num(d.total_prompt_tokens)}</div></div>
        <div class="card"><div class="label">Completion Tokens</div><div class="value">${num(d.total_completion_tokens)}</div></div>
        <div class="card ok"><div class="label">Est. Savings</div><div class="value" style="font-size:20px">${usd(d.estimated_saved_cost_usd)}</div><div class="sub">cloud cost: ${usd(d.estimated_cost_usd)}</div></div>
      </div>`;

    const bars = entries.length ? `
      <div class="section-title">Request Activity</div>
      <div class="chart-bar-wrap">${entries.slice(0, 14).map(e => {
        const tot = (e.total_requests || 0) + (e.total_deflected_requests || 0);
        const cloudW = Math.round((e.total_requests || 0) / maxReq * 100);
        const deflW = Math.round((e.total_deflected_requests || 0) / maxReq * 100);
        return `<div class="bar-row"><div class="bar-label">${e.period_label || e.date || '?'}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${cloudW}%"></div></div>
          <div class="bar-row" style="width:100%;margin:0"><div class="bar-label"></div>
          <div class="bar-track"><div class="bar-fill deflected" style="width:${deflW}%"></div></div>
          <div class="bar-val">${num(tot)} req</div></div></div>`;
      }).join('')}
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--tx2)">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--acc2);border-radius:2px;margin-right:4px"></span>L3 cloud</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--ok);border-radius:2px;margin-right:4px"></span>Deflected</span>
      </div></div>` : '';

    document.getElementById('us-content').innerHTML = summary + bars;
  } catch (e) {
    document.getElementById('us-content').innerHTML = `<div class="empty-state">Failed to load: ${e.message}</div>`;
  }
}

// ── Request Log ────────────────────────────────────────────────────────────
async function loadRequests() {
  document.getElementById('rq-content').innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const d = await apiFetch('/api/admin/requests');
    document.getElementById('rq-ts').textContent = fmtTs(Date.now());
    if (!d.enabled) {
      document.getElementById('rq-content').innerHTML =
        '<div class="empty-state">Request logging is disabled.<br>Set <code>enable_request_logs = true</code> in isartor.toml to enable.</div>';
      return;
    }
    const entries = d.entries || [];
    if (!entries.length) {
      document.getElementById('rq-content').innerHTML = '<div class="empty-state">No request log entries found.</div>';
      return;
    }
    const rows = [...entries].reverse().map(e => {
      const ok = (e.response_status || 0) < 400;
      const statusBadge = ok ? `<span class="badge-ok">${e.response_status}</span>` : `<span class="badge-err">${e.response_status}</span>`;
      const layer = e.final_layer != null ? `<span class="badge-info">L${e.final_layer}</span>` : '—';
      const ts = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '—';
      const latency = e.latency_ms != null ? e.latency_ms + 'ms' : '—';
      return `<tr>
        <td class="mono">${ts}</td>
        <td class="mono">${e.method || '—'} ${e.path || '—'}</td>
        <td>${statusBadge}</td>
        <td>${layer}</td>
        <td>${e.provider || '—'}</td>
        <td class="mono">${e.model || '—'}</td>
        <td class="mono">${latency}</td>
      </tr>`;
    }).join('');
    document.getElementById('rq-content').innerHTML = `
      <div style="font-size:11px;color:var(--tx2);margin-bottom:8px">Last ${entries.length} entries · log: <span class="mono">${d.log_path}</span></div>
      <table class="request-table">
        <thead><tr><th>Time</th><th>Request</th><th>Status</th><th>Layer</th><th>Provider</th><th>Model</th><th>Latency</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('rq-content').innerHTML = `<div class="empty-state">Failed to load: ${e.message}</div>`;
  }
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
if (apiKey) {
  // Pre-validate stored key on load
  fetch('/api/admin/overview', { headers: { 'Authorization': 'Bearer ' + apiKey } })
    .then(r => { if (r.ok) showApp(); else logout(); })
    .catch(() => logout());
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>
</body>
</html>
